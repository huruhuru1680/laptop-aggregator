groups:
  - name: laptop-aggregator-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors/sec on {{ $labels.method }} {{ $labels.path }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_ms_bucket[5m])) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "p95 latency is {{ $value }}ms on {{ $labels.method }} {{ $labels.path }}"

      - alert: HighCacheMissRate
        expr: rate(cache_misses_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High cache miss rate"
          description: "Cache miss rate is {{ $value | humanizePercentage }}"

      - alert: ServiceDown
        expr: up{job="laptop-aggregator-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "The laptop aggregator API has been down for more than 1 minute"

      - alert: RateLimitActive
        expr: rate(http_requests_total{status="429"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiting is being triggered"
          description: "{{ $value }} rejected requests/sec due to rate limiting"

      - alert: DatabaseConnectionPoolExhausted
        expr: rate(postgresql_connection_pool_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool exhausted"
          description: "PostgreSQL connection pool errors detected"

      - alert: ScraperJobBacklog
        expr: scrape_queue_size > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Scraper job backlog growing"
          description: "There are {{ $value }} pending scrape jobs"

      - alert: LowDataFreshness
        expr: time() - max(laptop_last_scraped_timestamp) > 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Laptop data may be stale"
          description: "No laptops scraped in the last 24 hours"

      - alert: HighDuplicateLaptopRate
        expr: rate(duplicate_laptop_upserts_total[1h]) / rate(laptop_upserts_total[1h]) > 0.3
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High duplicate laptop detection rate"
          description: "More than 30% of upserts are duplicates in the last hour"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_maxmemory_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory"

      - alert: RedisConnectionErrors
        expr: rate(redis_connection_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis connection errors detected"
          description: "{{ $value }} Redis connection errors/sec"