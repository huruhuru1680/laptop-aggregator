version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://postgres:password@postgres:5432/laptop_aggregator
      - LOG_LEVEL=info
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=laptop_aggregator
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c archive_mode=on
      -c archive_command='/bin/true'

  backup:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    entrypoint: ['/bin/sh', '-c']
    command: |
      while true; do
        pg_dump -h postgres -U postgres -d laptop_aggregator -f /backups/$$(date +%Y%m%d_%H%M%S).sql
        sleep 86400
      done
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: