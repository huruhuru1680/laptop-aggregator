name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Trigger Code Review
        if: github.event_name == 'pull_request'
        run: |
          PAYLOAD=$(echo '{}' | jq -c \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --arg pr_title "${{ github.event.pull_request.title }}" \
            --arg pr_url "${{ github.event.pull_request.html_url }}" \
            --arg action "${{ github.event.action }}" \
            '{pr_number: $pr_number, pr_title: $pr_title, pr_url: $pr_url, action: $action}')
          curl -s -X POST "${{ secrets.PAPERCLIP_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.PAPERCLIP_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      REGISTRY: ${{ env.REGISTRY }}
      IMAGE_NAME: ${{ env.IMAGE_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download docker-compose file
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v1
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Deploy to production server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            # Backup current state
            if [ -f docker-compose.yml ]; then
              mkdir -p backups/manual
              cp docker-compose.yml backups/manual/$(date +%Y%m%d_%H%M%S)_docker-compose.yml
            fi
            
            # Create production .env if not exists
            if [ ! -f .env ]; then
              cp .env.example .env
              # Update with production values via secrets
              sed -i 's|POSTGRES_URL=.*|POSTGRES_URL=${{ secrets.POSTGRES_URL }}|' .env
              sed -i 's|REDIS_URL=.*|REDIS_URL=${{ secrets.REDIS_URL }}|' .env
            fi
            
            # Update docker-compose to use new image
            sed -i 's|image: .*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|' docker-compose.yml
            
            # Pull and restart services
            docker-compose pull
            docker-compose up -d --no-deps
            
            # Verify deployment
            sleep 10
            curl -f http://localhost:3000/health || exit 1
            
            echo "Deployment successful"
          EOF